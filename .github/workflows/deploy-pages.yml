name: Deploy NoteNextra to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: Rebuild the full integrated site
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: note-nextra-pages
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  SITE_URL: 'https://nesbitt-bot.github.io/NoteNextra'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      any_changed: ${{ steps.collect.outputs.any_changed }}
      build_mode: ${{ steps.collect.outputs.build_mode }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'distribute/**'
              - 'app/**'
              - 'components/**'
              - 'public/**'
              - 'scripts/**'
              - 'mdx-components.js'
              - 'content/_meta.js'
              - 'content/index*'
              - 'content/about*'
              - 'content/contact*'
            CSE332S:
              - 'content/CSE332S/**'
              - 'public/CSE332S/**'
            CSE347:
              - 'content/CSE347/**'
              - 'public/CSE347/**'
            CSE4303:
              - 'content/CSE4303/**'
              - 'public/CSE4303/**'
            CSE442T:
              - 'content/CSE442T/**'
              - 'public/CSE442T/**'
            CSE510:
              - 'content/CSE510/**'
              - 'public/CSE510/**'
            CSE5313:
              - 'content/CSE5313/**'
              - 'public/CSE5313/**'
            CSE5519:
              - 'content/CSE5519/**'
              - 'public/CSE5519/**'
            CSE559A:
              - 'content/CSE559A/**'
              - 'public/CSE559A/**'
            Math3200:
              - 'content/Math3200/**'
              - 'public/Math3200/**'
            Math401:
              - 'content/Math401/**'
              - 'public/Math401/**'
            Math4111:
              - 'content/Math4111/**'
              - 'public/Math4111/**'
            Math4121:
              - 'content/Math4121/**'
              - 'public/Math4121/**'
            Math416:
              - 'content/Math416/**'
              - 'public/Math416/**'
            Math4201:
              - 'content/Math4201/**'
              - 'public/Math4201/**'
            Math4202:
              - 'content/Math4202/**'
              - 'public/Math4202/**'
            Math429:
              - 'content/Math429/**'
              - 'public/Math429/**'
            Math4302:
              - 'content/Math4302/**'
              - 'public/Math4302/**'
            Swap:
              - 'content/Swap/**'
              - 'public/Swap/**'

      - id: collect
        shell: bash
        env:
          SHARED_CHANGED: ${{ steps.filter.outputs.shared }}
          CHANGED_CSE332S: ${{ steps.filter.outputs.CSE332S }}
          CHANGED_CSE347: ${{ steps.filter.outputs.CSE347 }}
          CHANGED_CSE4303: ${{ steps.filter.outputs.CSE4303 }}
          CHANGED_CSE442T: ${{ steps.filter.outputs.CSE442T }}
          CHANGED_CSE510: ${{ steps.filter.outputs.CSE510 }}
          CHANGED_CSE5313: ${{ steps.filter.outputs.CSE5313 }}
          CHANGED_CSE5519: ${{ steps.filter.outputs.CSE5519 }}
          CHANGED_CSE559A: ${{ steps.filter.outputs.CSE559A }}
          CHANGED_MATH3200: ${{ steps.filter.outputs.Math3200 }}
          CHANGED_MATH401: ${{ steps.filter.outputs.Math401 }}
          CHANGED_MATH4111: ${{ steps.filter.outputs.Math4111 }}
          CHANGED_MATH4121: ${{ steps.filter.outputs.Math4121 }}
          CHANGED_MATH416: ${{ steps.filter.outputs.Math416 }}
          CHANGED_MATH4201: ${{ steps.filter.outputs.Math4201 }}
          CHANGED_MATH4202: ${{ steps.filter.outputs.Math4202 }}
          CHANGED_MATH429: ${{ steps.filter.outputs.Math429 }}
          CHANGED_MATH4302: ${{ steps.filter.outputs.Math4302 }}
          CHANGED_SWAP: ${{ steps.filter.outputs.Swap }}
        run: |
          modules=(CSE332S CSE347 CSE4303 CSE442T CSE510 CSE5313 CSE5519 CSE559A Math3200 Math401 Math4111 Math4121 Math416 Math4201 Math4202 Math429 Math4302 Swap)
          selected=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_rebuild }}" == "true" ]]; then
            echo 'build_mode=full' >> "$GITHUB_OUTPUT"
            echo 'any_changed=true' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$SHARED_CHANGED" == "true" ]]; then
            echo 'build_mode=full' >> "$GITHUB_OUTPUT"
            echo 'any_changed=true' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          [[ "$CHANGED_CSE332S" == "true" ]] && selected+=("CSE332S")
          [[ "$CHANGED_CSE347" == "true" ]] && selected+=("CSE347")
          [[ "$CHANGED_CSE4303" == "true" ]] && selected+=("CSE4303")
          [[ "$CHANGED_CSE442T" == "true" ]] && selected+=("CSE442T")
          [[ "$CHANGED_CSE510" == "true" ]] && selected+=("CSE510")
          [[ "$CHANGED_CSE5313" == "true" ]] && selected+=("CSE5313")
          [[ "$CHANGED_CSE5519" == "true" ]] && selected+=("CSE5519")
          [[ "$CHANGED_CSE559A" == "true" ]] && selected+=("CSE559A")
          [[ "$CHANGED_MATH3200" == "true" ]] && selected+=("Math3200")
          [[ "$CHANGED_MATH401" == "true" ]] && selected+=("Math401")
          [[ "$CHANGED_MATH4111" == "true" ]] && selected+=("Math4111")
          [[ "$CHANGED_MATH4121" == "true" ]] && selected+=("Math4121")
          [[ "$CHANGED_MATH416" == "true" ]] && selected+=("Math416")
          [[ "$CHANGED_MATH4201" == "true" ]] && selected+=("Math4201")
          [[ "$CHANGED_MATH4202" == "true" ]] && selected+=("Math4202")
          [[ "$CHANGED_MATH429" == "true" ]] && selected+=("Math429")
          [[ "$CHANGED_MATH4302" == "true" ]] && selected+=("Math4302")
          [[ "$CHANGED_SWAP" == "true" ]] && selected+=("Swap")

          if [[ ${#selected[@]} -eq 0 ]]; then
            echo 'build_mode=none' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'any_changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json='{"include":['
          first=true
          for module in "${selected[@]}"; do
            if [[ "$first" == true ]]; then
              first=false
            else
              json+=','
            fi
            json+="{\"module\":\"$module\"}"
          done
          json+=']}'

          echo 'build_mode=partial' >> "$GITHUB_OUTPUT"
          echo 'any_changed=true' >> "$GITHUB_OUTPUT"
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

  build_full:
    needs: detect
    if: needs.detect.outputs.build_mode == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build integrated site
        env:
          BASE_PATH: /NoteNextra
        run: |
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: pages-full-site
          path: out
          if-no-files-found: error

  build_partial:
    needs: detect
    if: needs.detect.outputs.build_mode == 'partial'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build module export
        env:
          KEEP_PAGES: ${{ matrix.module }}
          BASE_PATH: /NoteNextra
        run: |
          npm run build:distribute
          mkdir -p module-dist/${{ matrix.module }}/site
          cp -a out/. module-dist/${{ matrix.module }}/site/
      - uses: actions/upload-artifact@v4
        with:
          name: pages-${{ matrix.module }}
          path: module-dist/${{ matrix.module }}
          if-no-files-found: error

  deploy:
    needs: [detect, build_full, build_partial]
    if: always() && needs.detect.result == 'success' && (needs.build_full.result == 'success' || needs.build_full.result == 'skipped') && (needs.build_partial.result == 'success' || needs.build_partial.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare gh-pages working tree
        shell: bash
        run: |
          mkdir -p deploy
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add deploy gh-pages
          else
            git worktree add --orphan deploy
            cd deploy
            git rm -rf . >/dev/null 2>&1 || true
            touch .nojekyll
          fi

      - uses: actions/download-artifact@v4
        if: needs.detect.outputs.build_mode == 'full'
        with:
          name: pages-full-site
          path: full-site

      - uses: actions/download-artifact@v4
        if: needs.detect.outputs.build_mode == 'partial'
        with:
          pattern: pages-*
          path: artifacts
          merge-multiple: false

      - name: Publish full integrated site
        if: needs.detect.outputs.build_mode == 'full'
        shell: bash
        run: |
          find deploy -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a full-site/. deploy/
          touch deploy/.nojekyll

      - name: Overlay rebuilt module directories and shared shell
        if: needs.detect.outputs.build_mode == 'partial'
        shell: bash
        run: |
          shopt -s nullglob
          shared_synced=false
          modules=(CSE332S CSE347 CSE4303 CSE442T CSE510 CSE5313 CSE5519 CSE559A Math3200 Math401 Math4111 Math4121 Math416 Math4201 Math4202 Math429 Math4302 Swap)
          for artifact in artifacts/pages-*; do
            module=$(basename "$artifact" | sed 's/^pages-//')
            mkdir -p "deploy/$module"
            rm -rf "deploy/$module"/*
            cp -a "$artifact/site/$module/." "deploy/$module/"
            if [[ "$shared_synced" == false ]]; then
              find deploy -mindepth 1 -maxdepth 1 \( -name .git $(printf ' -o -name %q' "${modules[@]}") \) -prune -o -exec rm -rf {} +
              for item in "$artifact"/site/*; do
                name=$(basename "$item")
                skip=false
                for module_name in "${modules[@]}"; do
                  if [[ "$name" == "$module_name" ]]; then
                    skip=true
                    break
                  fi
                done
                if [[ "$skip" == false ]]; then
                  cp -a "$item" deploy/
                fi
              done
              shared_synced=true
            fi
          done
          touch deploy/.nojekyll

      - name: Refresh Pagefind across deployed tree
        if: needs.detect.outputs.build_mode != 'none'
        shell: bash
        run: |
          npx --yes pagefind --site deploy --output-path deploy/_pagefind

      - name: Commit and push gh-pages
        shell: bash
        run: |
          cd deploy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No deploy changes to commit"
            exit 0
          fi
          git commit -m "Deploy GitHub Pages for ${GITHUB_SHA::7}"
          git push origin HEAD:gh-pages
