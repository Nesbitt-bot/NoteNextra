name: Deploy NoteNextra to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: Rebuild every course subtree instead of only changed paths
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: note-nextra-pages
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  SITE_URL: 'https://nesbitt-bot.github.io/NoteNextra'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      any_changed: ${{ steps.collect.outputs.any_changed }}
      shared_changed: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'distribute/**'
              - 'app/**'
              - 'components/**'
              - 'public/**'
              - 'scripts/**'
              - 'mdx-components.js'
              - 'content/_meta.js'
              - 'content/index*'
              - 'content/about*'
              - 'content/contact*'
            CSE332S:
              - 'content/CSE332S/**'
              - 'public/CSE332S/**'
            CSE347:
              - 'content/CSE347/**'
              - 'public/CSE347/**'
            CSE4303:
              - 'content/CSE4303/**'
              - 'public/CSE4303/**'
            CSE442T:
              - 'content/CSE442T/**'
              - 'public/CSE442T/**'
            CSE510:
              - 'content/CSE510/**'
              - 'public/CSE510/**'
            CSE5313:
              - 'content/CSE5313/**'
              - 'public/CSE5313/**'
            CSE5519:
              - 'content/CSE5519/**'
              - 'public/CSE5519/**'
            CSE559A:
              - 'content/CSE559A/**'
              - 'public/CSE559A/**'
            Math3200:
              - 'content/Math3200/**'
              - 'public/Math3200/**'
            Math401:
              - 'content/Math401/**'
              - 'public/Math401/**'
            Math4111:
              - 'content/Math4111/**'
              - 'public/Math4111/**'
            Math4121:
              - 'content/Math4121/**'
              - 'public/Math4121/**'
            Math416:
              - 'content/Math416/**'
              - 'public/Math416/**'
            Math4201:
              - 'content/Math4201/**'
              - 'public/Math4201/**'
            Math4202:
              - 'content/Math4202/**'
              - 'public/Math4202/**'
            Math429:
              - 'content/Math429/**'
              - 'public/Math429/**'
            Math4302:
              - 'content/Math4302/**'
              - 'public/Math4302/**'
            Swap:
              - 'content/Swap/**'
              - 'public/Swap/**'

      - id: collect
        shell: bash
        env:
          SHARED_CHANGED: ${{ steps.filter.outputs.shared }}
          CHANGED_CSE332S: ${{ steps.filter.outputs.CSE332S }}
          CHANGED_CSE347: ${{ steps.filter.outputs.CSE347 }}
          CHANGED_CSE4303: ${{ steps.filter.outputs.CSE4303 }}
          CHANGED_CSE442T: ${{ steps.filter.outputs.CSE442T }}
          CHANGED_CSE510: ${{ steps.filter.outputs.CSE510 }}
          CHANGED_CSE5313: ${{ steps.filter.outputs.CSE5313 }}
          CHANGED_CSE5519: ${{ steps.filter.outputs.CSE5519 }}
          CHANGED_CSE559A: ${{ steps.filter.outputs.CSE559A }}
          CHANGED_MATH3200: ${{ steps.filter.outputs.Math3200 }}
          CHANGED_MATH401: ${{ steps.filter.outputs.Math401 }}
          CHANGED_MATH4111: ${{ steps.filter.outputs.Math4111 }}
          CHANGED_MATH4121: ${{ steps.filter.outputs.Math4121 }}
          CHANGED_MATH416: ${{ steps.filter.outputs.Math416 }}
          CHANGED_MATH4201: ${{ steps.filter.outputs.Math4201 }}
          CHANGED_MATH4202: ${{ steps.filter.outputs.Math4202 }}
          CHANGED_MATH429: ${{ steps.filter.outputs.Math429 }}
          CHANGED_MATH4302: ${{ steps.filter.outputs.Math4302 }}
          CHANGED_SWAP: ${{ steps.filter.outputs.Swap }}
        run: |
          modules=(CSE332S CSE347 CSE4303 CSE442T CSE510 CSE5313 CSE5519 CSE559A Math3200 Math401 Math4111 Math4121 Math416 Math4201 Math4202 Math429 Math4302 Swap)
          selected=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_rebuild }}" == "true" ]]; then
            selected=("${modules[@]}")
          elif [[ "$SHARED_CHANGED" == "true" ]]; then
            selected=("${modules[@]}")
          else
            [[ "$CHANGED_CSE332S" == "true" ]] && selected+=("CSE332S")
            [[ "$CHANGED_CSE347" == "true" ]] && selected+=("CSE347")
            [[ "$CHANGED_CSE4303" == "true" ]] && selected+=("CSE4303")
            [[ "$CHANGED_CSE442T" == "true" ]] && selected+=("CSE442T")
            [[ "$CHANGED_CSE510" == "true" ]] && selected+=("CSE510")
            [[ "$CHANGED_CSE5313" == "true" ]] && selected+=("CSE5313")
            [[ "$CHANGED_CSE5519" == "true" ]] && selected+=("CSE5519")
            [[ "$CHANGED_CSE559A" == "true" ]] && selected+=("CSE559A")
            [[ "$CHANGED_MATH3200" == "true" ]] && selected+=("Math3200")
            [[ "$CHANGED_MATH401" == "true" ]] && selected+=("Math401")
            [[ "$CHANGED_MATH4111" == "true" ]] && selected+=("Math4111")
            [[ "$CHANGED_MATH4121" == "true" ]] && selected+=("Math4121")
            [[ "$CHANGED_MATH416" == "true" ]] && selected+=("Math416")
            [[ "$CHANGED_MATH4201" == "true" ]] && selected+=("Math4201")
            [[ "$CHANGED_MATH4202" == "true" ]] && selected+=("Math4202")
            [[ "$CHANGED_MATH429" == "true" ]] && selected+=("Math429")
            [[ "$CHANGED_MATH4302" == "true" ]] && selected+=("Math4302")
            [[ "$CHANGED_SWAP" == "true" ]] && selected+=("Swap")
          fi

          if [[ ${#selected[@]} -eq 0 ]]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'any_changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json='{"include":['
          first=true
          for module in "${selected[@]}"; do
            if [[ "$first" == true ]]; then
              first=false
            else
              json+=','
            fi
            lower=$(echo "$module" | tr '[:upper:]' '[:lower:]')
            json+="{\"module\":\"$module\",\"slug\":\"$lower\"}"
          done
          json+=']}'

          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo 'any_changed=true' >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build module export
        shell: bash
        env:
          KEEP_PAGES: ${{ matrix.module }}
          BASE_PATH: /NoteNextra
        run: |
          npm run build:distribute
          mkdir -p module-dist/${{ matrix.module }}/site
          rsync -a out/ module-dist/${{ matrix.module }}/site/

      - uses: actions/upload-artifact@v4
        with:
          name: pages-${{ matrix.module }}
          path: module-dist/${{ matrix.module }}
          if-no-files-found: error

  deploy:
    needs: [detect, build]
    if: always() && needs.detect.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare gh-pages working tree
        shell: bash
        run: |
          mkdir -p deploy
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add deploy gh-pages
          else
            git worktree add --orphan deploy
            cd deploy
            git rm -rf . >/dev/null 2>&1 || true
            touch .nojekyll
          fi

      - uses: actions/download-artifact@v4
        if: needs.detect.outputs.any_changed == 'true'
        with:
          pattern: pages-*
          path: artifacts
          merge-multiple: false

      - name: Overlay rebuilt module directories
        if: needs.detect.outputs.any_changed == 'true'
        shell: bash
        run: |
          shopt -s nullglob
          shared_synced=false
          for artifact in artifacts/pages-*; do
            module=$(basename "$artifact" | sed 's/^pages-//')
            mkdir -p "deploy/$module"
            rsync -a --delete "$artifact/site/$module/" "deploy/$module/"

            if [[ "$shared_synced" == false ]]; then
              rsync -a --delete "$artifact/site/_next/" "deploy/_next/"
              rsync -a "$artifact/site/404.html" "deploy/404.html"
              rsync -a "$artifact/site/favicon.ico" "deploy/favicon.ico"
              rsync -a "$artifact/site/favicon.svg" "deploy/favicon.svg"
              shared_synced=true
            fi
          done

      - name: Create landing page and metadata
        shell: bash
        run: |
          cat > deploy/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>NoteNextra</title>
            <style>
              body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; line-height: 1.6; }
              h1 { margin-bottom: 0.2rem; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 24px; }
              a.card { display:block; padding: 14px 16px; border: 1px solid #ddd; border-radius: 10px; text-decoration: none; color: inherit; }
              a.card:hover { border-color: #666; }
              code { background: #f4f4f4; padding: 2px 6px; border-radius: 6px; }
            </style>
          </head>
          <body>
            <h1>NoteNextra</h1>
            <p>Incremental GitHub Pages deployment for course-note subtrees.</p>
            <p>Base URL: <code>https://nesbitt-bot.github.io/NoteNextra</code></p>
            <div class="grid">
              <a class="card" href="./CSE332S/">CSE332S</a>
              <a class="card" href="./CSE347/">CSE347</a>
              <a class="card" href="./CSE4303/">CSE4303</a>
              <a class="card" href="./CSE442T/">CSE442T</a>
              <a class="card" href="./CSE510/">CSE510</a>
              <a class="card" href="./CSE5313/">CSE5313</a>
              <a class="card" href="./CSE5519/">CSE5519</a>
              <a class="card" href="./CSE559A/">CSE559A</a>
              <a class="card" href="./Math3200/">Math3200</a>
              <a class="card" href="./Math401/">Math401</a>
              <a class="card" href="./Math4111/">Math4111</a>
              <a class="card" href="./Math4121/">Math4121</a>
              <a class="card" href="./Math416/">Math416</a>
              <a class="card" href="./Math4201/">Math4201</a>
              <a class="card" href="./Math4202/">Math4202</a>
              <a class="card" href="./Math429/">Math429</a>
              <a class="card" href="./Math4302/">Math4302</a>
              <a class="card" href="./Swap/">Swap</a>
            </div>
          </body>
          </html>
          EOF
          touch deploy/.nojekyll
          echo 'https://nesbitt-bot.github.io/NoteNextra' > deploy/CNAME.disabled

      - name: Refresh Pagefind across deployed tree
        shell: bash
        run: |
          npx --yes pagefind --site deploy --output-path deploy/_pagefind

      - name: Commit and push gh-pages
        shell: bash
        run: |
          cd deploy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No deploy changes to commit"
            exit 0
          fi
          git commit -m "Deploy GitHub Pages for ${GITHUB_SHA::7}"
          git push origin HEAD:gh-pages
